<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 | 作品集管理后台</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
        }
        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 40px 36px 36px;
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo .icon { font-size: 32px; }
        .login-logo h1 { font-size: 18px; font-weight: 600; margin-top: 8px; color: #111827; }
        .login-logo p { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            outline: none;
            transition: border-color 150ms;
        }
        .form-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.10); }
        .submit-btn {
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 150ms;
            margin-top: 4px;
        }
        .submit-btn:hover { background: #1d4ed8; }
        .submit-btn:disabled { background: #93c5fd; cursor: not-allowed; }
        .error-msg {
            margin-top: 14px;
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 13px;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">⚡</div>
            <h1>作品集管理后台</h1>
            <p>请登录以继续</p>
        </div>
        <form id="login-form">
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" id="login-email" class="form-input" placeholder="输入邮箱" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="login-password" class="form-input" placeholder="输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" class="submit-btn" id="login-btn">登 录</button>
            <div class="error-msg" id="error-msg"></div>
        </form>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // 已登录直接跳转
        if (sbAuth.isLoggedIn()) {
            window.location.replace('admin.html');
        }

        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('error-msg');
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            btn.disabled = true;
            btn.textContent = '登录中...';
            errEl.classList.remove('show');

            try {
                await sbAuth.signIn(email, password);
                window.location.replace('admin.html');
            } catch (err) {
                errEl.textContent = '登录失败：' + (err.message || '邮箱或密码错误');
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
